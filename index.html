:root {
  --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
  --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.9rem);
  --text-base: clamp(0.9rem, 0.85rem + 0.25vw, 1rem);
  --text-lg: clamp(1.1rem, 1rem + 0.5vw, 1.35rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1vw, 2rem);
  --text-kpi: clamp(2rem, 1.5rem + 2vw, 3rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --radius-sm: 0.375rem; --radius-md: 0.625rem; --radius-lg: 0.875rem;
  --radius-xl: 1.25rem; --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', 'Courier New', monospace;
  --content-max: 1200px;
}

:root, [data-theme="light"] {
  --color-bg: #eef4f5; --color-surface: #f5fafb; --color-surface-2: #ffffff;
  --color-surface-offset: #e4eff1; --color-border: #c2d8dc; --color-divider: #d3e6e9;
  --color-text: #0f2b30; --color-text-muted: #4a6a70; --color-text-faint: #8aadb3;

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background-color: var(--color-bg); line-height: 1.5; }
img, canvas, svg { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; color: inherit; font: inherit; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
table { border-collapse: collapse; width: 100%; }

.site-header { background: var(--color-surface); border-bottom: 1px solid var(--color-border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
.header-inner { max-width: var(--content-max); margin: 0 auto; padding: var(--space-3) var(--space-6); display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); }
.logo-lockup { display: flex; align-items: center; gap: var(--space-3); }
.logo-text { display: flex; flex-direction: column; gap: 1px; }
.logo-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); letter-spacing: -0.02em; line-height: 1.1; }
.logo-sub { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-faint); letter-spacing: 0.02em; }
.header-actions { display: flex; align-items: center; gap: var(--space-3); }
.live-badge { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); font-weight: 600; font-family: var(--font-mono); letter-spacing: 0.08em; color: var(--color-safe); background: var(--color-safe-bg); border: 1px solid var(--color-safe-border); padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); }
.live-badge.stale { color: var(--color-caution); background: var(--color-caution-bg); border-color: var(--color-caution-border); }
.live-badge.error { color: var(--color-danger); background: var(--color-danger-bg); border-color: var(--color-danger-border); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-safe); animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
.theme-toggle { width: 34px; height: 34px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); transition: background var(--transition-interactive), color var(--transition-interactive); }
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

.safety-banner.status-safe { background: var(--color-safe-bg); border-color: var(--color-safe); }
.safety-banner.status-caution { background: var(--color-caution-bg); border-color: var(--color-caution); }
.safety-banner.status-warning { background: var(--color-warning-bg); border-color: var(--color-warning); }
.safety-banner.status-danger { background: var(--color-danger-bg); border-color: var(--color-danger); }
.safety-banner.status-low { background: var(--color-low-bg); border-color: var(--color-low); }
